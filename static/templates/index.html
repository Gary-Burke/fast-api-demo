{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row g-3">

        <!-- Unique Numbers -->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <form id="unique-form" class="p-2">
                <fieldset class="p-2">
                    <legend>Unique Numbers</legend>
                    <div class="">
                        <div class="mb-3">
                            <label for="unique_amount" class="form-label">Amount of numbers:</label>
                            <input type="number" class="form-control" id="unique_amount" name="unique_amount" min="1"
                                placeholder="e.g. 6">
                        </div>
                        <div class="mb-3">
                            <label for="unique_min" class="form-label">Min Range:</label>
                            <input type="number" class="form-control" id="unique_min" name="unique_min"
                                placeholder="e.g. 1">
                        </div>
                        <div class="mb-3">
                            <label for="unique_max" class="form-label">Max Range:</label>
                            <input type="number" class="form-control" id="unique_max" name="unique_max"
                                placeholder="e.g. 49">
                        </div>
                        <div class="mb-3">
                            <label for="unique_exclude" class="form-label">Unlucky numbers to exclude:</label>
                            <input type="text" class="form-control" id="unique_exclude" name="unique_exclude"
                                placeholder="e.g. 6, 13, 9">
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-primary mb-3">Generate</button>
                        </div>
                        <div>
                            <p class="mb-1"><strong>Result:</strong></p>
                            <p class="mb-1 result" id="unique-result"></p>
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>

        <!-- Prime Numbers -->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <form id="prime-form" class="p-2">
                <fieldset class="p-2">
                    <legend>Prime Numbers</legend>
                    <div class="hidden">
                        <div class="mb-3">
                            <label for="prime_min" class="form-label">Min Range:</label>
                            <input type="number" class="form-control" id="prime_min" name="prime_min" min="1"
                                placeholder="e.g. 6">
                        </div>
                        <div class="mb-3">
                            <label for="prime_max" class="form-label">Max Range:</label>
                            <input type="number" class="form-control" id="prime_max" name="prime_max"
                                placeholder="e.g. 29">
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-primary mb-4">Generate</button>
                        </div>
                        <div>
                            <p class="mb-1"><strong>Result:</strong></p>
                            <p class="mb-1 result" id="prime-result"></p>
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>

        <!-- Circles -->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <form id="circle-form" class="p-2">
                <fieldset class="p-2">
                    <legend>Circle Values</legend>
                    <div class="hidden">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="circle_input" id="circle_radius"
                                value="radius" checked>
                            <label class="form-check-label" for="circle_radius">
                                Radius
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="circle_input" id="circle_diameter"
                                value="diameter">
                            <label class="form-check-label" for="circle_diameter">
                                Diameter
                            </label>
                        </div>
                        <div class="my-3">
                            <label for="circle_size" class="form-label">Radius of Circle:</label>
                            <input type="number" step="0.00001" class="form-control" id="circle_size" name="circle_size"
                                placeholder="e.g. 6">
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-primary mb-4">Generate</button>
                        </div>
                        <div>
                            <p class="mb-1" id="circle-size-label"><strong>Diameter:</strong></p>
                            <p class="mb-1 result" id="circle-size"></p>
                            <p class="mb-1"><strong>Area:</strong></p>
                            <p class="mb-1 result" id="circle-area"></p>
                            <p class="mb-1"><strong>Circumference:</strong></p>
                            <p class="mb-1 result" id="circle-circum"></p>
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>

        <!-- Password Generator -->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <form id="passw-form" class="p-2">
                <fieldset class="p-2">
                    <legend>Password Generator</legend>
                    <div class="hidden">

                        <!-- Password Length Range -->
                        <div class="my-2">
                            <label for="passw_len" class="form-label">Password Length</label>
                            <input type="range" class="form-range" min="1" max="4" value="2" step="1" id="passw_len"
                                data-bs-theme="dark">
                            <output for="passw_len" id="passw_output" aria-hidden="true">12 Characters</output>
                        </div>

                        <!-- Special Characters Checkbox -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" value="" id="passw_special" checked>
                            <label class="form-check-label" for="passw_special">
                                Include special characters
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <div class="col my-4">
                            <button type="submit" class="btn btn-primary">Generate</button>
                        </div>

                        <!-- Result Display -->
                        <div>
                            <p class="mb-1"><strong>Password:</strong></p>
                            <p class="mb-1 result" id="passw-result"></p>
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>

    </div>
</div>

{% endblock %}
